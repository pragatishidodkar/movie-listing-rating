<!DOCTYPE html>
<html>

<head>

<title>Cine Insight</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="movieDetail"></div>

<script src="movies-data.js"></script>

<script>

const params=new URLSearchParams(window.location.search)

const title=params.get("title")

const movie=movies.find(m=>m.title===title)

const container=document.getElementById("movieDetail")

container.innerHTML=`

<div style="text-align:center">

<h1>${movie.title}</h1>

<img src="${movie.poster}" width="300">

<p>${movie.genre}</p>

<p>Year: ${movie.year}</p>

<p>${movie.description}</p>

<iframe width="560" height="315" src="${movie.trailer}" frameborder="0" allowfullscreen></iframe>

</div>

`

</script>

</body>

</html>
