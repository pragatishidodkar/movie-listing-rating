<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Listing & Rating Website</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🎬 Movie Listing</h1>
<input type="text" id="search" placeholder="Search movie...">
</header>

<div class="movie-container" id="movieContainer"></div>

<div class="modal" id="movieModal">
<div class="modal-content">
<span class="close">&times;</span>
<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>
<iframe id="modalTrailer" width="100%" height="300" frameborder="0"></iframe>
</div>
</div>

<script src="script.js"></script>

</body>
</html>
